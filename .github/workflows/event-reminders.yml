name: Event and Closure Reminders

on:
  schedule:
    # Pacific reminder windows. Both daylight and standard UTC offsets are listed;
    # the app only sends when the current Del Mar hour is exactly 7am or 12pm.
    - cron: "0 14,15,19,20 * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          curl --fail-with-body --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://app.delmarjiujitsuclub.com/api/cron/reminders
